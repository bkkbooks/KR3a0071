body:
  text: 提要家山圗書一卷儒家類臣等謹案家山圗書一卷不著撰人名氏永樂大典題為朱子所作今考書中引用諸説有文公家禮且有朱子之稱則非朱子手定明矣錢曽讀書敏求記曰家山圗書晦菴私淑弟子之文案弟子二字刋本誤倒其文今改正盖逸書也李晦顯翁得之於劉世常平父劉得之於魯齋許文正公其書以易中庸古大學古小學參列於圗而于修身之指歸綱領條分極詳此本惜不多覯宜刋布之以廣其𫝊云云曽家所藏舊本乆已不𫝊世無刋版書遂散佚惟永樂大典尚備載其原文然首列古小學本㫖圗中多曲禮内則少儀之事與曽所謂以易中庸古大學參列于圗者體例稍異意是書諸儒相𫝊互有増損行世者非一本歟然要其指歸則一也其書先圗後説根據禮經依類標題詞義顯著自入學以至成人序次冠昏喪祭賓禮樂射御書數諸儀節至詳且備而負劍辟咡以及鄉飲五御諸圗尤足補聶崇義所未及盖朱子小學一書詳於義理而此則詳於名物度數之間二書相輔而行本末互資内外兼貫均于䝉養之學深有所禆有不容以偏廢者焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8d7d39cc1455ee33b3a6c34b31e8b598276d79b5d6d64ccac7541d864f6cbf1f
