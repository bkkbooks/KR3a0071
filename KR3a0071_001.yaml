body:
  text: 正義曰諸侯曰泮宫泮之言半蓋東西門以南通水北門無也所以降殺於天子王制云諸侯止有泮宫一學魯之所立非獨泮宫明堂位曰米廪有虞氏之庠也序夏后氏之學也瞽宗殷學也頖宫周學也是魯得立四代之學僖公修之示存古法也鄉飲酒義曰鄉飲酒之義主人拜迎賔于庠門之外入三揖而後至階三讓而後升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也尊讓潔敬者君子之所以相接也賔主象天地也介僎象隂陽也三賔象三光也讓之三象月之三日而成魄也四面之坐象四時也六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明飬老也鄉飲酒禮序主州以郡守縣以縣令位於東南賔擇鄉里寄居年德髙及致仕者為之位於西北僎州以通判縣以丞或簿位於東北介以次長位於西南三賔以賔之次者為之位於賔主介僎之後又設郡僚之位東西相嚮其餘仕與未仕者皆以齒序位於兩廊司正以衆所推服者為之相及贊以士之熟於禮者為之先一日設樽罍爵洗各如奠謁之儀又於庠序之廊設主賔介僎三賔之次又設席於堂下凡鄉之仕與未仕者以齒序立又設席於庠門之外自堂下各以序行立於庠門之席質明主人率賔以下先釋菜于先聖先師退各就次以俟速賔門外速賔序賔再拜祭酒啐酒主獻賔受賔酬主人主人酬介介酬衆賔修爵無算請主沃洗司正揚觶拜送賔介拜既而退緇布冠以緇布為之其冠廣三寸落頂前後兩頭皆在武上向內反屈之縫於武左辟積周制多􅙭音輒而橫縫之皮辨士冠禮注云皮辨以白鹿皮為之象太古又舊圖云以鹿皮淺毛黃白者為之髙一尺二寸爵辨鄭云冕之次也其色赤而微黑如爵頭然用三十升布為之亦長尺六寸廣八寸前圓後方無旒而前後平三禮圖陳氏曰服陳于房東領上北贊者立于房西面上南醴設于房尊篚籩豆上南冠辨執于西坫南上東主人立于東序面西賔立于西序面東冠者未冠既冠面南即席加冠面西醴之面南其降而見母面北其始也賔揖冠者即筵坐贊者坐櫛設纚賔降與升正纚降受辨進容祝而冠之既冠揖之適房服其服又揖之即筵坐櫛纚祝加如初蓋賔盥所以致潔降盥降受冠辨所以致敬始加降一等再加降二等三加降三等以服彌尊故降彌下也按家禮前期一日女氏使人張陳其壻之室厥明壻家設位于室中女家設次于外初昏壻盛服主人告于祠堂遂醮其子而命之迎壻出乘馬至女家候于次女家主人告于祠堂遂醮其女而命之主人出迎壻入奠鴈姆奉女出登車壻乘馬先婦車至其家導婦以入壻婦交拜就坐飲食畢壻出復入脫服燭出主人禮賔凡男為人後者為其私親皆降一等惟本生父母降服不杖期申心喪三年其本生父母亦為之降服不杖期姑姊妹女子之在室服並與男子同嫁反者亦同適人無夫與子者為其兄弟姊妹及兄弟之子不杖期凡女適人者為其私親皆降一等惟祖及曾高祖不降為兄弟之為父後者不降為兄弟姪之妻不降嫡母妾子謂父正室曰嫡母正服齊衰三年母死則無服庶子為嫡母之父母兄弟姊妹小功嫡出母謂為父所出降服杖期母為子降服不杖期父後者則不服子為嫁母謂父卒母嫁降服杖期已子為父後者則不服嫁母為前夫之子與從嫁者服不杖期三禮圖倚廬者倚木為廬在中門外東方北戶喪服傳孝子居倚廬寢苫枕塊不脫絰帶居門外之廬哀親之在外也寢苫枕塊者哀親之在草土也苫編藁塊墼也既虞翦屏柱楣寢有席九虞七虞五虞三虞之後乃改舊廬西向開户剪去戶傍兩廂屏之餘草柱楣者前梁謂之楣楣下兩頭竪柱施梁乃夾户傍之屏寢有席者間傳云既虞苄不翦納鄭云苄今之蒲蘋即此寢有席謂蒲席加於苫上也既練舍外寢此寢謂中門外於屋下壘塹為之不塗塈之堊室也屋下對廬偏加東壁而言也初喪居廬堊室子為父臣為君各依親疏貴賤之序宫正云大喪授廬舍辨其親疏貴賤之居注云親者貴者居廬疏者賤者居堊室雜記云朝廷卿大夫士居廬都邑之士居堊室按唐大厯年中有揚垂撰喪服圖説廬形制及堊室幕次敘列次第云設廬次於東廊下無廊於墻下北上凡起廬先以一木橫於墻下去墻五尺卧於地為楣即立五椽於上斜倚東墉上以草苫蓋之其南北面亦以草屏之向北開門一孝一廬門簾以縗布廬形如偏屋其間容半席廬間施苫凷其廬南為堊室以墼壘三面上至屋加於墻下即亦如偏屋以瓦覆之西向戶室施薦木枕室南為大功幕次次中施蒲席次南又為小功緦麻次施牀並西户如諸侯始起廬門門外便有小屏餘則否其為母與父同為繼母慈母不居廬居堊室如繼母有子即隨子居廬為妻凖母其堊室及幕次不必每人致之共處可也婦人次於西廊下見時於中庭輦障中以藳薄覆為之既違古制故引唐禮以規之斬不緝也斬衰裳者謂斬三升苴麻之布以為衰裳也凡衰外削幅裳內削幅削猶殺也幅三幅袧其裳前三幅後四幅每幅辟褶三象喪冠之辟積三也袧為辟褶屈中者謂辟兩側空中央也負廣出於適寸適者辟領也與闕中共一尺六寸負用布方廣尺有八寸故得出適兩傍各寸也負布縫於領下下垂放之以其置在背上故得負名適博四寸出於衰者以衰長六寸博四寸綴於外襟之上廣長當心適在闕領之外各廣四寸與闕領共有一尺六寸闕即領闕中也故兩適向前與衰相望兩傍各出六寸適即辟領衣自領至衣腰二尺二寸兩身前後四尺四寸兩傍共有八寸八寸加闕中與辟領尺有六寸然則此除袪袂衰負四物惟計衣身而言凡用布一丈四寸袂屬幅而不削袂所以連衣身者明兩袂與衣身參齊也袂尺二寸足以容中人之併兩手也三禮圖齊衰者齊緝也其衣裳冠制並如斬衰但用次粗生布緝其旁及下際斬衰冠比衣裳用布稍細紙糊為材廣三寸長足跨頂前後褁以布為三􅀈皆向布縱縫之用麻繩一條從額上約之至頂後交過前各至耳結之以為武屈冠兩頭入武內向外反屈之縫於武武之餘繩垂下為纓結於頥下齊衰冠冠以布為武及纓其制並如斬衰斬衰首絰以有子麻為之其圍九寸麻本在左從額前向右圍之從頂過後以其末加本上又以繩為纓以固之如冠之制齊衰首絰以無子麻為之大七寸餘本在右末繫本下布纓制與斬衰同腰絰大七寸有餘兩股相交兩頭結之各存麻本散垂三尺其交結處兩傍各綴小繩繫之絰帶用有子麻繩一條大半腰絰中屈之為兩股各一尺餘乃合之其大如絰圍腰從左過後至前乃以其右端穿兩股間而反插於右在絰之下文公家禮吕汲公家祭儀曰古者小宗有四有繼禰之宗繼祖之宗繼曾祖之宗繼髙祖之宗所以主祭祀而統族人後世宗法既廢散無所統祭祀之禮家自行之支子不能不祭祭不必告于宗子今宗法雖未易復而宗子主祭之義略可舉行宗子為士庶子為大夫以上牲祭于宗子之家故今議家廟雖因支子而立亦宗子主其祭而用其支子命數所得之禮可合禮意子朱子曰祭祀須是用宗子法方不亂不然前面必有不可處置者父在主祭子出仕宦不得祭父沒宗子主祭庶子出仕宦祭時其禮亦合減殺不得同宗子宗子只得立適雖庶長立不得若無適子則亦立庶子所謂世子之同母弟世子是適若世子死則立世子之親弟亦是次適也是庶子不得立也大宗法既立不得亦當立小宗法祭自髙祖以下親盡則請出髙祖就伯叔位服未盡者祭之嫂則别處後其子私祭之今世禮全亂了家禮古命士得立家廟家廟之制內立寢廟中立正廟外立門四面墻圍之非命士上祭於堂上只祭考妣伊川謂無貴賤皆祭自髙祖而下但祭有豐殺踈數不同廟向南坐皆東向伊川於此不審乃云廟皆東向祖先位面東自廳側直東入其所反轉面西入廟中其制非是古人所以廟面東向坐者蓋户在東牗在西坐於一邉乃是奧處先生謂欲立一家廟小五架屋以後架作一長龕堂以板隔截作四龕堂堂置位牌堂外用簾子小小祭祀時亦可只就其處大祭祀則請出或堂或廳皆可祠堂之制三間外為中門中門外為兩階皆三級東曰阼階西曰西階階下隨地廣狹以屋覆之令可容家衆敘立又為遺書衣物祭器庫及神厨於其東繚以周垣别為外門常加扄閉若家貧地狹則止為一間不立厨庫而東西壁下置立兩匱西藏遺書衣物東藏祭器則亦可正寢謂前堂也地狹則於廳事之東亦可凡祠堂所在之宅宗子世守之不得分析家禮時祭用仲月前旬卜日前期三日齋戒前一日設位陳器省牲滌器具饌厥明夙興設蔬果酒饌質明奉主就位參神降神進饌初獻亞獻終獻侑食闔門啓門受胙辭神納主徹餕凡祭主於盡愛敬之誠而已貧則稱家之有無疾則量筋力而行之財力可及者自當如儀勺籥也舞籥文舞也孔氏曰籥笛也籥舞以其不用兵器故象文也以其年尚幼故習之小舞也記言十有三年舞勺成童舞象皆小舞也象舞武舞也謂干戈之小舞也孔氏注云象舞象用兵刺伐之舞樂記曰樂者非謂黃鍾大吕弦歌干揚也樂之末節也故童者舞之內則曰成童舞象蓋勺是周公之樂象是武王之樂此朱子説也按陳氏樂書曰勺者成王酌先祖之道象即象簫南蓋文王樂歌也夫物生而有情情發而為聲故天五與地十合而生土於中其聲為宫地四與天六合而生金於西其聲為商天三與地八合而生木於東其聲為角地二與天七合而生火於南其聲為徵天一與地六合而生水於北其聲為羽宫中也居中央暢四方唱始施生為四聲綱也其性圓其聲若牛之鳴窖而主合商章也物成熟可章度也其性方其聲若羊之離羣而主張角觸也物觸而出戴芒角也其性直其聲若雞之鳴木而主湧徵祉也物盛大而繁祉也其性明而辨物其聲若豕之負駭而主分羽宇也物聚藏宇覆之也其性潤而澤物其聲若鳥之鳴野而主吐其用則為敏經迭抑其象則為君臣民事物其位則為左右上下中其色則為青黃赤白黑其性則為仁義禮智信其情則為喜怒悲憂恐其事則為貌言視聽思在天運而為五氣在地列而為五行在人竅而為五臟則中聲所止無往不在焉昔黃帝使伶倫自大夏之西崑崙之隂取嶰谷之竹其自然圓虛者三日九分斷兩吹之取其竅之厚且均者兩節間也以為黃鍾之宫又制十二筒以象鳳凰之鳴其雄鳴為六雌鳴亦六陽六為律隂六為吕六律六吕總謂之十二律以配十二月黃鍾大簇姑洗蕤賔夷則無射陽聲也大吕應鍾南吕林鍾仲吕夾鍾隂聲也蓋日月會於十二次而右轉聖人制六吕以象之斗柄運於十二辰而左旋聖人制六律以象之故陽律左旋以合隂隂吕右轉以合陽而天地四方隂陽之聲具焉凡十二律相生之位自黃鍾之律數八至林鍾林鍾數八至太簇太簇數八至南吕南吕數八至姑洗姑洗數八至應鍾應鍾數八至㽔賔周而復始黃鍾黃者中之色也鍾種也陽氣潛萌於黃宫萬物孳萌於子而黃鍾子之氣也其候冬至其卦乾之初九故合於大呂而下生林鍾焉大吕吕旅也言隂大吕助黃鍾宣氣而芽物也萬物紐芽於丑而大吕丑之氣也其候大寒其卦坤之六四也故合於黃鍾而下生夷則焉太簇簇奏也言陽氣大奏地而逹物也萬物引逹於寅而太簇寅之氣也其候啓蟄其卦則乾之九二也故合於應鍾而下生南呂焉夾鍾言隂夾助太簇宣四方之氣而種物也萬物冒茆於卯而夾鍾卯之氣也其候春分其卦則坤之六五也故合於無射而下生無射焉姑洗姑故也洗新也言陽氣養生去故就新也萬物振美於辰而姑洗辰之氣也其候清明其卦乾之九三故合於南吕而下生應鍾焉仲吕言陽已而隂萌則萬物盡旅而西行萬物已盛於已而仲吕己之氣也其候小滿其卦則坤之上六也故合於夷則而上生黃鍾焉蕤賔蕤繼也賔導也言陽始導隂氣使繼養萬物也萬物咢布於午而蕤賔午之氣也其候夏至其卦乾之九四也故合於林鍾而上生大吕焉林鍾林君也言隂氣受任助蕤賔君主種物使長大茂盛也萬物薆昧於未而林鍾未之氣其候大暑其卦坤之六二故合蕤賔而上生太簇焉夷則言厥民夷時萬物莫不華而實也雖未及中亦有儀則矣萬物申堅於申而夷則申之氣也其候處暑其卦乾之九五故合仲吕而上生夾鍾焉南吕南任也言隂氣旅助夷則任成萬物也萬物留熟於酉而南吕酉之氣也其候秋分其卦則坤之六二也故合於姑洗而上生姑洗焉無射射厭也言陽氣究物使氣畢落之終而復始無厭已也萬物睪入於戍而無射戍之氣也其候霜降其卦乾之上九故合夾鍾而上生仲吕焉應鍾言隂氣應無射該藏萬物而雜陽閡種也萬物以隂藏歸根復命而該閡於亥應鍾亥之氣其候小雪其卦坤之六三故合太簇而上生㽔賔焉射禮惟天子為備大射尤重天子射畢徹虎侯次諸侯射次卿大夫射各張其侯奏其樂餘可類推射人令人去侯立于後以矢行髙下左右告于王欲必中也服不氏以旌居乏而待獲中則揚之鄉射於序而用鹿中鄭氏謂士為州長者之禮也然其言射必兼庠序言禮必兼大夫周官鄉大夫有鄉射之禮則鄉射不特士而已大射前二日宰夫戒宰及司馬鄉射不言蓋戒與射同日也大射有大射正小射正司射鄉射則有司而已蓋皆主人之吏為之也大射設次於東故不適堂西鄉射無次故射者適堂西而已大射負侯者諾則以宫又諾以商鄉射獲者諾聲不絶而已大射獻服不則侯西北三步北面拜受爵鄉射獻獲者於侯而已以服不士也故獻近于乏鄉人賤也故獻即于侯也大射鍾師以鍾鼓奏祴夏鄉射以鼓祴夏以君尊故有鍾鼓大夫士卑特用鼓也大射度侯道以狸步鄉射則度以躬大射乏西十步北十步鄉射則乏參侯道居侯黨之一西五步此大射鄉射之别也陳氏禮書按大戴禮記保傳曰在衡為鸞在軾為和周禮太馭以鸞和為節注引秦詩鸞鑣疏云田車鸞在鑣乘車鸞在衡皆金為鈴按雙峯饒氏云衢道也交衢如今十字街模樣若轉過這一邉則須轉得合箇舞底節奏鄭詩云兩驂如舞蓋謂御之中節也逐水曲謂御車隨逐水勢之屈曲而不墜水也賈公彥疏無正文先鄭以意而言耳饒氏曰此御田獵之車與軍旅之車凡田獵用大艾草以為防或舍其中君表如轅門之類是植起兩車以為門褐纒旃以為門是植起兩旗於兩旁以為門也以毛褐纒在上裘纒質以為𣙗者質是斧之錐頭或云用刑砧子是門闑古者門之當中用一壁尺使門闔至此而止所謂𣙗也謂以毛裘纒質之上以為門闑也按秦詩曰公曰左之則禽入防虞五豝奉辰牡而御者從左以逐之君從左以射之詩曰悉率左右以燕天子則亦驅左右之禽以趨於右也傳曰自左膘而射之達於右脾為上殺射右耳本次之射左膘達於右骼為下殺面傷不獻踐毛不獻不成禽不獻禽雖多擇三十焉其餘以與大夫士以習射於澤宫蓋中心而速死者上殺也以為乾豆逺心而死緩者次殺也以待賔客中腸胃汗泡而死尤緩者下殺也以充君厨面傷不獻為誅降也不成禽不獻為夭夭也擇取三十每禽擇三十而乾豆賔客君庖各十也內則曰子事父母雞初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用逼屨著綦婦事舅姑如事父母雞初鳴咸盥潄櫛縰笄總衣紳左右佩用襟纓綦屨以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以溫之父母舅姑必嘗之而后退男女未冠笄者則佐長者視具家禮曰凡子事父母婦事姑舅天欲明咸起盥潄櫛總具冠帶昧爽適父母舅姑之所省問父母舅姑起子供藥物婦具晨羞供具畢乃退各從其事禮記文王之為世子朝於王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及暮又至亦如之文公家禮曰凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不晏逰舍置餘事専以迎醫檢方合藥為務疾已復初朱子曰投投壺也擁抱也矢投壺箭也尊者委四矢於地一一取以投卑者不敢委於地悉執之以侍饒氏曰凡射兩人為耦上耦居左下耦居右長者四起取四矢少者不敢與敵禮只一起揔取四矢括要云古者衣裳不相連惟深衣上下相連被體深邃故謂之深衣以白細布為之裳十二幅以應十有二月交解裁之狹頭在上除縫削外實廣六寸下齊咨倍之此據中人而言耳十二幅外别添兩斜衽於旁縫屬於裳謂之續衽加緣於上不欲緣侵裳之正幅也鉤邉者裳下圜其角如鉤恐其垂下而不齊也𬒮圜以應規圜者謂胡下也袂袖也牛領下垂謂之胡圜其𬒮下謂從袖口至腋下裁令其勢圎如牛胡也曲祫如矩以應方者祫領也曲祫交領也今朝祭之服領皆向下交垂也負繩及踝胡瓦反以應直者負繩謂背後縫上下相當而取直如繩之正非謂用繒為負繩也踝足跟也及踝者裳止其足跟長無被土之義也下齊如權衡以應平者裳下曰齊齊緝也取其齊如字如衡平而無低昻參差也祛袖口也尺有二寸圍之則二尺四寸要中則三其祛之圍格腋下也稍寬於袪可以運肘衣純者衣之緣也領緣廣二寸衣緣廣寸半帶兩邉飾各廣一寸取其次弟登降之義也具大父母父母衣純以繢繢織餘也畫也繪五采以為文相次而畫是亦戲綵斑斕之義具父母衣純以青餘皆以緇大帶用白繒夾縫之廣四寸以束要垂其餘三尺謂之紳謂鈕屈而紳伸也以黑繒禆之禆謂附飾其側也繚音了四寸謂旁兩鈕各繚二寸組用青小絛為之所以約其帶長與紳齊如字也若夫冠巾與屨制度具於各圖之下古之君子必佩玉其制上有折衡下有雙璜中有琚瑀下有衝牙貫之以組綬納之以蠙珠而其色有白蒼赤之辨其聲有角徴宫羽之應其象有仁義禮智忠信道德之備或結或垂所以著屈伸之理或設或否所以適文質之宜此所以純固之德不內遷非辟之心無自而入也蓋衡以平其心璜以中其德琚欲其有所安牙欲其有所制右徴角所以象事與民左宫羽所以象君與物趨以采齊行以肆夏所以比於樂周還中規折還中矩所以比於禮進則揖之於前退則揚之於後則佩之為物奚適而非道邪蓋民為貴君為輕事為先物為後能治民然後能安君能應事然後能生物所以事與民在所右物與君在所左也春秋傳曰改步改玉自天子至士步固不同而玉亦隨異天子佩白玉諸侯佩山玄玉大夫佩水蒼玉世子佩瑜玉士佩瓀玫白玉最貴瓀玫至賤山玄以象君德水蒼以象臣職山玄水蒼其文也瑜與瓀其質也世子佩瑜則士佩瓀矣士佩瓀則世子而上佩堅矣瓀或作瑜以其多石故也玫或作珉以其賤故也玄紞魯語曰王后親織玄紞紞所以縣瑱當耳者也天子諸侯瑱玄紞黃纊卿大夫瑱玄紞青纊士瑱玄紞素纊紘士冠禮云緇組紘纁邊此謂皮辨爵辨皆有笄故設此紘也先以一條組於左笄上繫定繞頥下右相向上仰屬於笄屈繫之有餘因垂為飾纁邊者以緇為中以纁為邊側而織之也舊圗紘頭别出細帶為誤綖辨師掌王之五冕皆玄冕朱裏延紐禮記天子玉藻十有二旒前後邃綖左傳云衡紞紘綖先儒謂綖冕上覆古者績麻三十升布上玄下朱以素裏冕版三十升則麻之尤精者也孔子曰麻冕禮也今也純儉則古者五冕皆麻至孔子時乃去麻用純櫛梳也詩其比如櫛文公注櫛理髮器言密也縰者緇纚長六尺所以褁髻承冠以全幅疊而用之笄者安髻之笄以縰韜髮作髻既訖橫施此笄於髻中以固髻非固冠之笄也總者裂練繒為之束髮之本垂餘於髻後以為飾髦用髮為之象幼時鬌內則曰子生三月則剪其胎髮為鬌帶之于首男角女羇逮其笄冠也則綵飾之加于冠謂之髦不忘父母生育之恩父母喪則徹之冠者玄冠也纓者結之項下以固冠結之餘者散而下垂則謂之緌端玄端士服也端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸韠者蔽膝也以韋為之與裳同色上繫之革帶紳大帶也天子素帶朱裏終辟大夫素帶辟垂士紳帶率下辟自天子至大夫皆垂長三尺廣四寸士又殺焉童子之帶非必全錦也惟紳用錦以親在致飾而已笏忽也君有命則書其上備忽忘也笏長二尺有六寸其中博三寸其殺六分而去一徐廣曰笏即今之手板也纓縭之屬按郭璞注云縭香纓也褘邪交落帶繫於體以佩容臭纓之帶曰襟屨注云禪下曰屨綦屨繫也屨頭施綦以為行戒朱子曰綦鞋口帶也古人皆旋繫今人只從簡易綴之於上如假帶然槃承盥水者奉槃者勞故少者以之以上並出注疏內則曰子事父母左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧按注云紛帨拭物之巾也刀礪磨石也觽狀如錐角鋭可以解紐玦射決著右手之拇指以鉤弦捍韝臂也韋為之以捍弦管筆彄也遰刀鞸也金木二燧以備隂睛之取火焉玉藻云童子之飾也緇布衣錦緣錦紳并紐錦束髮皆朱錦也童子不裘不帛不屨絇注云只白屨不用鼻頭帶末拘之以為行戒女子之服也副笄六珈按正義云副以覆首為飾祭服有衡笄垂于副旁以懸瑱既笄而加此六飾故謂之珈如漢步搖也瑱當耳者以玉為之揥謂以象骨搔首因以為飾也縞衣細繒也戰國䇿云強弩之餘不能穿魯縞是薄繒也巾女人蒼艾色衣巾襜衣蔽前也帨是拭物之巾縭是香纓逼者以行縢逼束其脛自足至膝以自逼束朱子曰敦今杯盂也牟土釡也今以木為之象土釡之形巵酒器也匜盛酒漿之器也孔氏云此父母舅姑所服用之器子婦不得輒用也襟鞶內則婦事舅姑佩針管線纊施鞶帙鄭氏曰鞶小囊也鞶帙言施明為針管線纊熊氏曰帙刺也刺帙而為鞶囊故曰鞶帙然則士婚禮所謂襟鞶是也篋士冠禮緇布冠缺項以至緇組紘同篋鄭氏曰隋方曰篋則隋者狹而長也笥釋曲禮曰圓曰簞方曰笥書曰衣裳在笥則笥亦盛衣之器楎楎􅍻也植者曰楎椸橫竿為椸即衣枷也
