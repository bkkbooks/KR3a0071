front:
  text: 曲禮曰將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶先生書策琴瑟在前坐而遷之戒勿越坐必安執爾顔長者不及毋儳言正爾容聽必恭毋勦説毋雷同必則古昔稱先王又曰侍坐於先生問焉終則對請業則起請益則起孔氏曰非唯教之聽立至於行步亦宜教之提擕謂牽將行時因牽行之又教之為節也奉長者之手為兒長大方當供養扶持長者故先使學之令習便也辟傾也不正嚮之令氣不觸兒亦令見長者所為而復習之也兒在懷中亦稱負故內則云始負子童子雖未能掩口以對長者亦教其為之以為後法鄉遂鄉以嚮於內遂以遂於外內者謂之民則以禮義為主故鄉大夫待之以教法外者謂之氓則以功事為主故遂大夫齊之以政令孰説文閭里門也爾雅曰門側之堂謂之孰尚書大傳曰大夫七十而致仕老其鄉里大夫為父師士為少師嵗事已畢餘子皆入學距冬至四十五日始出學傳農事上老平明坐於右孰庶老坐於左孰餘子畢出然後歸夕亦如之蓋古者合二十五家而為之門孰坐父師少師於此所以教之學也庠序孟子曰庠者養也序者射也鄉飲酒尊兩壺於房户之間鄉射尊於賔席之東蓋鄉飲在庠而庠有房室鄉射在序而序無房室也陸氏佃云禮記天子設四學蓋天子立四學并中學而五於一處並建周人則辟雍居中其南為成均其北為上庠其東為東序其西為瞽宗學禮者就瞽宗學書者就上庠學舞干戈羽籥者就東序學樂德樂語樂舞者就成均辟雍唯天子承師問道飬三老五更又出師受成等就焉天子入太學則四學之人環水而觀之是謂辟雍大戴禮曰帝入東學上親而貴仁東庠是也帝入南學上齒而貴信成均是也帝入西學上賢而貴德瞽宗是也帝入北學上貴而尊爵上庠是也帝入太學承師而問道辟雍是也總而言之四學亦太學也
